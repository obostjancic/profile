    <!-- Preconnect to external domains -->

      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Load styles -->
    <link rel="stylesheet" type="text/css" href="style.css" />

    <!-- Set theme before page load -->
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ognjen Bostjancic",
        "alternateName": "Ogi",
        "url": "https://ognjenbostjancic.com",
        "image": "https://ognjenbostjancic.com/assets/prog_gen_blue_350.jpg",
        "sameAs": [
          "https://github.com/obostjancic",
          "https://linkedin.com/in/obostjancic",
          "https://twitter.com/obostjancic"
        ],
        "jobTitle": "Software Engineer",
        "worksFor": {
          "@type": "Organization",
          "name": "Sentry",
          "url": "https://sentry.io"
        },
        "description": "Software engineer at Sentry. Building innovative AI solutions and developer tools.",
        "knowsAbout": [
          "Software Engineering",
          "AI",
          "Web Development",
          "React",
          "TypeScript",
          "Python",
          "Developer Tools"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Vienna",
          "addressCountry": "Austria"
        },
        "alumniOf": "University of Sarajevo"
      }
    </script>

    <script>
      const audio = new Audio("assets/ogi.mp3");
      audio.preload = "auto";

      document.addEventListener("DOMContentLoaded", () => {
        const currentTheme = localStorage.getItem("theme") || "light";
        document.documentElement.setAttribute("data-theme", currentTheme);

        const themeToggle = document.querySelector("#theme-toggle");
        themeToggle.src =
          currentTheme === "dark" ? "assets/sun.svg" : "assets/moon.svg";

        themeToggle.addEventListener("click", () => {
          const currentTheme =
            document.documentElement.getAttribute("data-theme");
          const targetTheme = currentTheme === "dark" ? "light" : "dark";

          document.documentElement.setAttribute("data-theme", targetTheme);
          localStorage.setItem("theme", targetTheme);
          themeToggle.src =
            targetTheme === "dark" ? "assets/sun.svg" : "assets/moon.svg";
        });

        const play = document.querySelector("#play");
        play.addEventListener("click", () => {
          audio.currentTime = 0;
          audio.play().catch((error) => {
            console.warn("Audio playback failed:", error);
          });
        });

        const iconStatus = document.querySelector("#icon-status");
        const iconsArea = document.querySelector("#icons-area");
        const buttonsWithLabels = document.querySelectorAll("#icons [data-tooltip]");

        const showIconStatus = (button) => {
          const buttonRect = button.getBoundingClientRect();
          const iconsAreaRect = iconsArea.getBoundingClientRect();
          const centerX = buttonRect.left - iconsAreaRect.left + buttonRect.width / 2;

          iconStatus.textContent = button.getAttribute("data-tooltip");
          iconStatus.style.left = `${centerX}px`;
          iconStatus.setAttribute("data-active", "true");
        };

        const resetIconStatus = () => {
          iconStatus.textContent = "";
          iconStatus.style.left = "50%";
          iconStatus.removeAttribute("data-active");
        };

        buttonsWithLabels.forEach((button) => {
          button.addEventListener("mouseenter", () => showIconStatus(button));
          button.addEventListener("mouseleave", resetIconStatus);
          button.addEventListener("focus", () => showIconStatus(button));
          button.addEventListener("blur", resetIconStatus);
        });
      });
    </script>
    <title>Ogi - Software Engineer @ Sentry</title>
  </head>

  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <nav id="menu" role="navigation" aria-label="Theme toggle">
      <button id="theme-toggle" aria-label="Toggle dark mode">
        <img src="assets/sun.svg" alt="Theme toggle" />

    </nav>
    <main id="main">
      <section id="hero">
        <div id="title">

          <div id="phonetic">

            <h1>o-ghee</h1>
          </div>
        </div>
        <h2>

            target="_blank"
            rel="noopener noreferrer"
            aria-label="Sentry (opens in new tab)"

        </h2>
        <div id="icons-area">
          <div id="icons" role="list">
            <a
              id="linkedin"

              rel="noopener noreferrer"

            </a>
            <a
              id="github"

              rel="noopener noreferrer"
              role="listitem"
              aria-label="GitHub (opens in new tab)"
              data-tooltip="GitHub"
            >

            </a>
            <a
              id="email"
              href="mailto:ognjen.bostjancic@gmail.com"
              role="listitem"
              aria-label="Copy email address"
              data-tooltip="Email"
            >
              <img src="assets/email.svg" alt="Email" loading="lazy" />
            </a>
            <a
              id="resume"
              href="./ogi.pdf"
              target="_blank"
              rel="noopener noreferrer"
              role="listitem"
              aria-label="Resume (opens in new tab)"
              data-tooltip="Resume"
            >

            </a>
          </div>
          <p id="icon-status" aria-live="polite"></p>
        </div>
      </section>
    </main>
  </body>
</html>
